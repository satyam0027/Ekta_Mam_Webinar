<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Not Completed | Voice & Anchoring Webinar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="status-page status-page--cancel">
    <div class="status-card status-card--cancel">
      <div class="status-icon">⚠️</div>
      <h1 class="status-title" id="cancel-title">Payment Not Completed</h1>
      <p class="status-text" id="cancel-message">
        Your registration is saved, but payment was not completed.
      </p>
      <div class="status-note status-note--red">
        <strong>Don't worry!</strong><br>
        Your details are already saved. You can return and complete the ₹299 payment anytime to confirm your webinar seat.
      </div>
      <p id="cancel-status-note" class="status-text"></p>
      <div class="status-actions">
        <a href="index.html#register" class="btn-primary btn-lg">
          <span>Try Payment Again</span>
        </a>
        <a href="index.html" class="btn-ghost">
          <span>← Back to Webinar</span>
        </a>
      </div>
    </div>
  </div>
  <script src="/js/config.js"></script>
  <script src="/js/payment-flow.js"></script>
  <script src="/js/cancel.js"></script>
  <script>
    const pageStatus = new URLSearchParams(window.location.search).get('status');
    const msg = document.getElementById('cancel-message');
    const title = document.getElementById('cancel-title');
    if (pageStatus === 'failed') {
      if (msg) msg.textContent = 'Your payment could not be processed. Please try again.';
      if (title) title.textContent = 'Payment Failed';
    }
  </script>
</body>
</html>
